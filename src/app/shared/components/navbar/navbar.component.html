<!-- src/app/shared/components/navbar/navbar.component.html -->

<nav class="navbar">
  <div class="navbar-container">
    
    <!-- ── HAMBURGER BUTTON (MÓVIL) ─────────────────────────────── -->
    <button 
      class="hamburger-btn-navbar" 
      type="button"
      [attr.aria-label]="'Abrir menú'"
      (click)="toggleMenuMobile()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- ── BRAND / LOGO ────────────────────────────────────────── -->
    <a class="navbar-brand" href="/" title="SRS Manager">
      <svg class="logo" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="9" y1="9" x2="15" y2="9"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <span class="brand-text">SRS Manager</span>
    </a>

    <!-- ── SPACER (empuja todo a la derecha) ──────────────────── -->
    <div class="spacer"></div>

    <!-- ── MENÚ DE USUARIO ─────────────────────────────────────── -->
    <div class="navbar-menu" *ngIf="usuario">
      <div class="user-menu">
        <button 
          class="profile-button"
          [class.active]="showDropdown"
          (click)="toggleDropdown($event)"
          type="button"
          [attr.aria-expanded]="showDropdown">
          <div class="profile-avatar" [title]="usuario.email">
            {{ getInitials(usuario.email) }}
          </div>
        </button>

        <!-- ── DROPDOWN MENU ────────────────────────────────────── -->
        <div class="dropdown-menu" *ngIf="showDropdown" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <div class="dropdown-user-info">
              <div class="dropdown-avatar">
                {{ getInitials(usuario.email) }}
              </div>
              <div class="dropdown-user-details">
                <div class="dropdown-name">{{ usuario.email }}</div>
                <div class="dropdown-email">{{ usuario.email }}</div>
              </div>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <a class="dropdown-item" href="/perfil" title="Ver perfil">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span>Mi Perfil</span>
          </a>

          <a class="dropdown-item" href="/configuracion" title="Configuración">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="1"/>
              <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/>
            </svg>
            <span>Configuración</span>
          </a>

          <div class="dropdown-divider"></div>

          <button 
            class="dropdown-item dropdown-item-danger" 
            (click)="pedirLogout()"
            type="button">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1"/>
            </svg>
            <span>Cerrar sesión</span>
          </button>
        </div>
      </div>
    </div>

  </div>
</nav>

<!-- ── MODAL DE CONFIRMACIÓN LOGOUT ──────────────────────────────── -->
<div *ngIf="showLogoutConfirm" class="logout-modal-overlay" (click)="cancelarLogout()">
  <div class="logout-modal" (click)="$event.stopPropagation()">
    <div class="logout-modal-header">
      <h2>¿Cerrar sesión?</h2>
    </div>
    <div class="logout-modal-content">
      <p>¿Estás seguro de que deseas cerrar sesión?</p>
      <p class="logout-modal-subtitle">Necesitarás volver a iniciar sesión para acceder nuevamente.</p>
    </div>
    <div class="logout-modal-footer">
      <button class="logout-modal-btn logout-modal-btn-cancel" (click)="cancelarLogout()" type="button">
        Cancelar
      </button>
      <button class="logout-modal-btn logout-modal-btn-confirm" (click)="confirmarLogout()" type="button">
        Cerrar sesión
      </button>
    </div>
  </div>
</div>
