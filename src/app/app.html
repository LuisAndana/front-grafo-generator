<!-- src/app/app.html -->

<div class="app-layout">
  <!-- ── NAVBAR ──────────────────────────────────────────────────── -->
  <app-navbar 
    *ngIf="!isWelcomePage"
    (toggleSidebar)="toggleSidebar()"
    [sidebarOpen]="sidebarOpen"
    [usuario]="usuario">
  </app-navbar>
  
  <!-- ── BODY (Sidebar + Main) ──────────────────────────────────── -->
  <div class="app-body">
    <!-- ── SIDEBAR ────────────────────────────────────────────────── -->
    <app-sidebar 
      *ngIf="!isWelcomePage"
      [sidebarOpen]="sidebarOpen"
      (closeSidebar)="closeSidebar()">
    </app-sidebar>
    
    <!-- ── MAIN CONTENT ────────────────────────────────────────────– -->
    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
